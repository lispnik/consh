name: CI

on:
  push:
    branches: [ main ]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (SBCL / Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL and ocicl
        run: |
          # ocicl ships a signed apt repo for x86_64 Debian/Ubuntu.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends sbcl curl
          curl -fsSL https://ocicl.github.io/ocicl/deb-repo/ocicl-archive-keyring.gpg \
            | sudo tee /usr/share/keyrings/ocicl-archive-keyring.asc > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/ocicl-archive-keyring.asc] https://ocicl.github.io/ocicl/deb-repo stable main" \
            | sudo tee /etc/apt/sources.list.d/ocicl.list
          sudo apt-get update
          sudo apt-get install -y ocicl
          ocicl setup
          sbcl --version
          ocicl version

      # ocicl.csv pins the dependency versions; cache the fetched sources so
      # `ocicl install` is a no-op restore when the lockfile is unchanged.
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ocicl
          key: ocicl-${{ runner.os }}-${{ hashFiles('ocicl.csv') }}

      - name: Restore dependencies (from ocicl.csv)
        run: ocicl install

      - name: Run test suite
        run: |
          cat > /tmp/run-tests.lisp <<'LISP'
          (require :asdf)
          ;; Find both the project system and the fetched deps under ./ocicl,
          ;; independent of ocicl's ~/.sbclrc integration (we skip it below).
          (asdf:initialize-source-registry
            (list :source-registry (list :tree (truename ".")) :inherit-configuration))
          (handler-case (asdf:load-system :consh/test)
            (serious-condition (e)
              (format *error-output* "~&LOAD FAILED: ~A~%" e)
              (sb-ext:exit :code 2)))
          (unless (fiveam:run! (find-symbol "CONSH" (find-package :consh/test)))
            (sb-ext:exit :code 1))
          LISP
          sbcl --noinform --no-userinit --no-sysinit --non-interactive --load /tmp/run-tests.lisp

      - name: Build standalone image and smoke-test it
        run: |
          cat > /tmp/build.lisp <<'LISP'
          (require :asdf)
          (asdf:initialize-source-registry
            (list :source-registry (list :tree (truename ".")) :inherit-configuration))
          (asdf:make :consh)
          LISP
          sbcl --noinform --no-userinit --no-sysinit --non-interactive --load /tmp/build.lisp
          test -x ./consh
          out=$(printf 'echo image works\nseq 1 3 | grep 2\n(+ 40 2)\n' | ./consh)
          echo "$out"
          echo "$out" | grep -q "image works"
          echo "$out" | grep -q "^2$"
          echo "$out" | grep -q "^42$"
