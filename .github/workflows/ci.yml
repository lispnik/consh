name: CI

on:
  push:
    branches: [ main ]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (SBCL / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL and ocicl (Linux)
        if: runner.os == 'Linux'
        run: |
          # ocicl ships a signed apt repo for x86_64 Debian/Ubuntu.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends sbcl curl
          curl -fsSL https://ocicl.github.io/ocicl/deb-repo/ocicl-archive-keyring.gpg \
            | sudo tee /usr/share/keyrings/ocicl-archive-keyring.asc > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/ocicl-archive-keyring.asc] https://ocicl.github.io/ocicl/deb-repo stable main" \
            | sudo tee /etc/apt/sources.list.d/ocicl.list
          sudo apt-get update
          sudo apt-get install -y ocicl
          ocicl setup
          sbcl --version
          ocicl version

      - name: Install SBCL and ocicl (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install sbcl ocicl
          ocicl setup
          sbcl --version
          ocicl version

      # ocicl.csv pins the dependency versions; cache the fetched sources so
      # `ocicl install` is a no-op restore when the lockfile is unchanged.
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ocicl
          key: ocicl-${{ runner.os }}-${{ hashFiles('ocicl.csv') }}

      - name: Restore dependencies (from ocicl.csv)
        run: ocicl install

      - name: Run test suite
        run: |
          cat > /tmp/run-tests.lisp <<'LISP'
          (require :asdf)
          ;; Find both the project system and the fetched deps under ./ocicl,
          ;; independent of ocicl's ~/.sbclrc integration (we skip it below).
          (asdf:initialize-source-registry
            (list :source-registry (list :tree (truename ".")) :inherit-configuration))
          (handler-case (asdf:load-system :consh/test)
            (serious-condition (e)
              (format *error-output* "~&LOAD FAILED: ~A~%" e)
              (sb-ext:exit :code 2)))
          (unless (fiveam:run! (find-symbol "CONSH" (find-package :consh/test)))
            (sb-ext:exit :code 1))
          LISP
          # GitHub's macOS runners intermittently deny posix_spawn with EPERM
          # ("Operation not permitted") on unrelated spawn-heavy tests. A real
          # test regression fails deterministically on every attempt, so retry
          # the whole suite a few times: a genuine failure still fails all N,
          # while a transient spawn flake clears on a later attempt.
          for attempt in 1 2 3; do
            echo "::group::test attempt $attempt"
            if sbcl --noinform --no-userinit --no-sysinit --non-interactive --load /tmp/run-tests.lisp; then
              echo "::endgroup::"; exit 0
            fi
            echo "::endgroup::"
            echo "attempt $attempt failed"
          done
          echo "test suite failed on all attempts"; exit 1

      - name: Build standalone image and smoke-test it
        run: |
          cat > /tmp/build.lisp <<'LISP'
          (require :asdf)
          (asdf:initialize-source-registry
            (list :source-registry (list :tree (truename ".")) :inherit-configuration))
          (asdf:make :consh)
          LISP
          sbcl --noinform --no-userinit --no-sysinit --non-interactive --load /tmp/build.lisp
          test -x ./consh
          # The image spawns processes too; retry to ride out the macOS
          # posix_spawn EPERM flake (see the test step for why).
          smoke() {
            out=$(printf 'echo image works\nseq 1 3 | grep 2\n(+ 40 2)\n' | ./consh)
            echo "$out"
            echo "$out" | grep -q "image works" || return 1
            # grep is a wrapper: `seq | grep` yields a grep-match object, not "2".
            echo "$out" | grep -q 'GREP-MATCH 2 "2"' || return 1
            echo "$out" | grep -q "^42$" || return 1
          }
          for attempt in 1 2 3; do
            if smoke; then exit 0; fi
            echo "smoke attempt $attempt failed"
          done
          echo "smoke test failed on all attempts"; exit 1
